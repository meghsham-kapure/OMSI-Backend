services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: omsevainfra_superuser
      MONGO_INITDB_ROOT_PASSWORD: test123
      MONGO_INITDB_DATABASE: osi_web_db
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
